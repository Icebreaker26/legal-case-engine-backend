name: Quality Assurance Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    services:
      postgres:
        image: ankane/pgvector
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: '2608'
          POSTGRES_DB: DBVECTOR
        # Montamos el archivo copiado a la ruta temporal
        volumes:
          - /tmp/init.sql:/docker-entrypoint-initdb.d/init.sql
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare DB Schema
        run: cp src/db/init_schema.sql /tmp/init.sql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci

      - name: Run Testing Suite
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:2608@localhost:5432/DBVECTOR
          JWT_SECRET: super_secret_key_change_me_123456
          TEST_USER_EMAIL: alejandro.marin@enel.com
          TEST_USER_PASS: 123456
          NODE_ENV: test
